<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capwel Studio Pro - Precision 20</title>
    <style>
        :root { --gold: #f1c40f; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 10px; margin: 0; padding-bottom: 100px; }
        .tempo-bar { background: #000; padding: 15px; border-bottom: 2px solid var(--gold); margin-bottom: 20px; position: sticky; top: 0; z-index: 1000; text-align: center; }
        input[type=range] { width: 80%; accent-color: var(--gold); margin-top: 10px; }
        .beat-card { background: #111; border: 1px solid #333; border-radius: 12px; padding: 12px; margin-bottom: 15px; }
        /* Grille à 4 colonnes pour les deux roulements */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        button { background: #222; color: white; border: 1px solid #444; padding: 15px 2px; border-radius: 8px; font-weight: bold; font-size: 0.65rem; cursor: pointer; transition: 0.2s; }
        button.active { background: var(--gold); color: black; box-shadow: 0 0 10px var(--gold); }
        button.next { border: 2px solid #e67e22; animation: flash 0.4s infinite; }
        @keyframes flash { 50% { opacity: 0.5; } }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #000; padding: 15px; border-top: 1px solid var(--gold); z-index: 100; }
    </style>
</head>
<body>

    <div class="tempo-bar">
        <h2 style="color:var(--gold); margin:0; font-size: 1rem;">CAPWEL ENGINE PRECISION V2</h2>
        <div style="font-size: 0.75rem; margin-top: 5px;">TEMPO : <span id="vitesse-label">100</span>%</div>
        <input type="range" min="0.8" max="1.3" step="0.01" value="1.0" id="tempo-slider">
    </div>
    
    <div id="studio"></div>

    <div class="footer">
        <button onclick="window.location.reload()" style="width:100%; background:#e74c3c; color:white; border:none; padding:12px; font-weight:bold; border-radius:8px;">RESET STUDIO</button>
    </div>

    <script>
        // Bibliothèque étendue à 20 Beats
        const MaBibliotheque = [];
        for (let i = 1; i <= 20; i++) {
            let num = i < 10 ? "0" + i : i;
            MaBibliotheque.push({ id: num, nom: "SESSION " + num, folder: "beat" + i });
        }

        let currentAudio = new Audio();
        let nextFile = "";
        let nextBtn = null;
        let lastBeatFile = "";
        let lastBeatBtn = null;
        let speed = 1.0;
        const offsetLMMS = 0.05; 

        const slider = document.getElementById('tempo-slider');
        const label = document.getElementById('vitesse-label');

        slider.oninput = function() {
            speed = this.value;
            label.innerText = Math.round(speed * 100);
            currentAudio.playbackRate = speed;
        };

        // Moteur de précision
        setInterval(() => {
            if (!currentAudio.paused) {
                let ct = currentAudio.currentTime;
                
                // LOGIQUE DE SWITCH RAPIDE (Toutes les 1s)
                if (nextFile !== "") {
                    // Si on atteint un palier de 1s (0.95, 1.95, 2.95...)
                    if (ct % 1 >= 0.95 || ct >= 3.94) {
                        playNow(nextFile, nextBtn);
                        nextFile = ""; nextBtn = null;
                    }
                } 
                // BOUCLE NORMALE OU RETOUR AUTO
                else if (ct >= 3.94) {
                    if ((currentAudio.src.includes('_roul')) && lastBeatFile !== "") {
                        playNow(lastBeatFile, lastBeatBtn);
                    } else {
                        currentAudio.currentTime = offsetLMMS;
                        currentAudio.play();
                    }
                }
            }
        }, 10);

        function prepare(file, btn) {
            // Mémorise si c'est une mélodie (Beat A ou B)
            if (file.includes('_mela') || file.includes('_melb')) {
                lastBeatFile = file;
                lastBeatBtn = btn;
            }

            if (currentAudio.paused || !currentAudio.src) {
                playNow(file, btn);
            } else {
                document.querySelectorAll('button').forEach(b => b.classList.remove('next'));
                btn.classList.add('next');
                nextFile = file;
                nextBtn = btn;
            }
        }

        function playNow(file, btn) {
            currentAudio.src = file;
            currentAudio.currentTime = offsetLMMS;
            currentAudio.playbackRate = speed;
            currentAudio.play().catch(e => console.log("Prêt pour lecture"));
            
            document.querySelectorAll('button').forEach(b => b.classList.remove('active', 'next'));
            if(btn) btn.classList.add('active');
        }

        const container = document.getElementById('studio');
        MaBibliotheque.forEach(beat => {
            const div = document.createElement('div');
            div.className = 'beat-card';
            div.innerHTML = `
                <div style="margin-bottom:8px; font-size:0.75rem; color:var(--gold); font-weight:bold;">${beat.nom}</div>
                <div class="grid">
                    <button onclick="prepare('${beat.folder}_mela.mp3', this)">MEL A</button>
                    <button onclick="prepare('${beat.folder}_melb.mp3', this)">MEL B</button>
                    <button onclick="prepare('${beat.folder}_roul.mp3', this)">ROUL 1</button>
                    <button onclick="prepare('${beat.folder}_roul1.mp3', this)">ROUL 2</button>
                </div>`;
            container.appendChild(div);
        });
    </script>
</body>
</html>
